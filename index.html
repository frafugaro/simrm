<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siemens Magnetom Vida 3T - Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for Siemens UI feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .tab-btn.active { background-color: #374151; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="h-screen w-screen bg-gray-900 text-gray-200 overflow-hidden font-sans select-none">

    <!-- Login Screen -->
    <div id="login-screen" class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-lg shadow-2xl border border-gray-700 w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">MAGNETOM Vida 3T</h1>
            <div class="mb-4">
                <label class="block text-sm mb-2 text-gray-400">System Password</label>
                <input type="password" id="login-pwd" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-blue-500" placeholder="Enter password...">
            </div>
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Login</button>
            <p id="login-err" class="text-red-500 text-sm mt-3 hidden text-center">Invalid Password</p>
        </div>
    </div>

    <!-- Main UI -->
    <div class="flex h-full flex-col">
        <!-- Header -->
        <header class="h-16 bg-black border-b border-gray-700 flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <div class="text-blue-500 font-bold text-xl tracking-wider">syngo.MR</div>
                <div class="text-gray-400 text-sm border-l border-gray-600 pl-4">Simulator Environment</div>
            </div>
            <div class="flex gap-8 text-sm">
                <div class="bg-gray-800 px-4 py-2 rounded border border-gray-700">
                    <span class="text-gray-400 block text-xs">TA</span>
                    <span id="out-ta" class="font-mono text-green-400 text-lg">0:00</span>
                </div>
                <div class="bg-gray-800 px-4 py-2 rounded border border-gray-700">
                    <span class="text-gray-400 block text-xs">SNR (Rel)</span>
                    <span id="out-snr" class="font-mono text-yellow-400 text-lg">1.00</span>
                </div>
                <div class="bg-gray-800 px-4 py-2 rounded border border-gray-700">
                    <span class="text-gray-400 block text-xs">Ny / Nz eff</span>
                    <span class="font-mono text-white text-lg"><span id="out-ny">0</span> / <span id="out-nz">0</span></span>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar Tabs -->
            <nav class="w-48 bg-gray-900 border-r border-gray-700 flex flex-col py-4">
                <button class="tab-btn active text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-routine">Routine</button>
                <button class="tab-btn text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-contrast">Contrast</button>
                <button class="tab-btn text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-resolution">Resolution</button>
                <button class="tab-btn text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-geometry">Geometry</button>
                <button class="tab-btn text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-physio">Physio</button>
                <button class="tab-btn text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-sequence">Sequence</button>
                <button class="tab-btn text-left px-6 py-3 text-sm font-medium hover:bg-gray-800 transition" data-target="tab-setup">Setup</button>
            </nav>

            <!-- Parameters Area -->
            <main class="w-1/3 bg-gray-800 p-6 overflow-y-auto border-r border-gray-700 relative">
                
                <!-- ROUTINE TAB -->
                <div id="tab-routine" class="tab-content grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Routine</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slab Group</label><input type="number" data-key="Slab_Group" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slabs (0 for 2D)</label><input type="number" data-key="Slabs" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slices per Slab</label><input type="number" data-key="Slices" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Phase Enc Dir</label>
                        <select data-key="Phase_Enc_Dir" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="A>>P">A>>P</option><option value="R>>L">R>>L</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">FOV Read (mm)</label><input type="number" data-key="FOV_Read" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">FOV Phase (%)</label><input type="number" data-key="FOV_Phase" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slice Thick (mm)</label><input type="number" step="0.5" data-key="Slice_Thick" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">TR (ms)</label><input type="number" data-key="TR" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">TE eff (ms)</label><input type="number" data-key="TEeff" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">NEX (Averages)</label><input type="number" data-key="NEX" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Concatenations</label><input type="number" data-key="Concatenations" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                </div>

                <!-- CONTRAST TAB -->
                <div id="tab-contrast" class="tab-content hidden grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Contrast</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Flip Angle (°)</label><input type="number" data-key="Flip_Angle" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Fat-Water Contrast</label>
                        <select data-key="Fat_Water_Contrast" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="Standard">Standard</option><option value="FatSat">FatSat</option><option value="WaterSat">WaterSat</option><option value="Dixon">Dixon</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Dynamic Mode</label>
                        <select data-key="Dynamic_Mode" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="None">None</option><option value="Standard">Standard</option>
                        </select>
                    </div>
                </div>

                <!-- RESOLUTION TAB -->
                <div id="tab-resolution" class="tab-content hidden grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Resolution</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Base Res (Nx)</label><input type="number" data-key="Nx" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Phase Res (%)</label><input type="number" data-key="Phase_Res" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slice Res (%)</label><input type="number" data-key="Slice_Res" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Phase OS (%)</label><input type="number" data-key="Phase_OS" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slice OS (%)</label><input type="number" data-key="Slice_OS" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Phase Partial Fourier</label>
                        <select data-key="Phase_Partial" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="100">Off (8/8)</option><option value="87.5">7/8</option><option value="75">6/8</option><option value="62.5">5/8</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Slice Partial Fourier</label>
                        <select data-key="Slice_Partial" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="100">Off (8/8)</option><option value="87.5">7/8</option><option value="75">6/8</option><option value="62.5">5/8</option>
                        </select>
                    </div>
                </div>

                <!-- GEOMETRY TAB -->
                <div id="tab-geometry" class="tab-content hidden grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Geometry</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Position</label>
                        <select data-key="Position" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="Isocenter">Isocenter</option><option value="Local">Local</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Orientation</label>
                        <select data-key="Orientation" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="Axial">Axial</option><option value="Sagittal">Sagittal</option><option value="Coronal">Coronal</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">AutoAlign</label>
                        <select data-key="AutoAlign" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="Off">Off</option><option value="Head>Brain">Head>Brain</option><option value="Spine">Spine</option>
                        </select>
                    </div>
                </div>

                <!-- PHYSIO TAB -->
                <div id="tab-physio" class="tab-content hidden grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Physio & Patient</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Anatomical Region</label>
                        <select data-key="Region" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="Abdomen">Abdomen</option><option value="Pelvis">Pelvis</option>
                            <option value="Thorax">Thorax</option><option value="Skull">Skull</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Weight (kg)</label><input type="number" data-key="Weight" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Height (cm)</label><input type="number" data-key="Height" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                </div>

                <!-- SEQUENCE TAB -->
                <div id="tab-sequence" class="tab-content hidden grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Sequence</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Accel Mode</label>
                        <select data-key="Accel_Mode" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="None">None</option><option value="GRAPPA">GRAPPA</option>
                            <option value="CAIPIRINHA">CAIPIRINHA</option><option value="CS">Compressed Sensing (CS)</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Accel PE (R)</label><input type="number" data-key="Accel_PE" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Accel 3D</label><input type="number" data-key="Accel_3D" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">CS Factor (1-10)</label><input type="number" step="0.1" data-key="CS_Factor" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Bandwidth (Hz/Px)</label><input type="number" data-key="BW" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Echo Spacing (ms)</label><input type="number" step="0.1" data-key="Echo_Spacing" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Turbo Factor (ETL)</label><input type="number" data-key="Turbo_Factor" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Echo Train Duration (ms)</label><input type="number" data-key="Echo_Train_Duration" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white"></div>
                </div>

                <!-- SETUP TAB -->
                <div id="tab-setup" class="tab-content hidden grid grid-cols-2 gap-4">
                    <h2 class="col-span-2 text-lg font-semibold text-blue-400 border-b border-gray-600 pb-2 mb-2">Setup</h2>
                    <div class="flex flex-col"><label class="text-xs text-gray-400">Coil Elements</label>
                        <select data-key="Coil_Elements" class="state-input bg-gray-900 border border-gray-600 rounded p-1 text-sm text-white">
                            <option value="Body">Body</option><option value="Body+Spine">Body+Spine</option><option value="Head/Neck 20">Head/Neck 20</option>
                        </select>
                    </div>
                </div>

            </main>

            <!-- Viewer Area -->
            <section class="flex-1 bg-black flex flex-col relative">
                <div class="absolute top-4 left-4 text-xs text-gray-500 z-10">Image Viewer (Simulated Bloch Contrast)</div>
                <div id="phantom-container" class="flex-1 flex items-center justify-center w-full h-full p-10">
                    <!-- SVG Injected Here via phantom.js -->
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts in specific order -->
    <script src="js/config.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/phantom.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
