<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Simulator V4 - Vida 3T</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .tab-btn.active { background-color: #1e293b; border-left: 4px solid #3b82f6; color: #fff; }
        .flash-highlight { animation: flashBlue 1.5s ease-out; }
        @keyframes flashBlue { 0% { background-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 4px #3b82f6; } 100% { background-color: transparent; box-shadow: 0 0 0 0px transparent; } }
    </style>
</head>
<body class="h-screen w-screen bg-slate-900 text-slate-300 overflow-hidden font-sans text-sm flex flex-col select-none">

    <!-- Login Overlay -->
    <div id="login-screen" class="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-slate-900 p-8 rounded-lg shadow-2xl border border-slate-700 w-96 flex flex-col items-center">
            <div class="w-12 h-12 bg-blue-600 text-white font-bold flex items-center justify-center rounded-lg text-2xl mb-4">S</div>
            <h1 class="text-xl font-bold mb-2 text-slate-100">MAGNETOM Vida 3T</h1>
            <p class="text-xs text-slate-500 mb-6">Clinical Simulator V4</p>
            <input type="password" id="login-pwd" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-center text-white focus:outline-none focus:border-blue-500 mb-4" placeholder="Enter password...">
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition uppercase text-xs tracking-wider">Login</button>
            <p id="login-err" class="text-red-500 text-xs mt-3 hidden">Invalid Password</p>
        </div>
    </div>

    <!-- Header -->
    <header class="h-14 bg-slate-950 border-b border-slate-800 flex items-center justify-between px-4 shrink-0 z-40 relative">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 text-white font-bold flex items-center justify-center rounded-sm text-lg">S</div>
            <div>
                <div class="text-slate-100 font-bold tracking-wide">syngo.MR</div>
                <div class="text-[10px] text-slate-500 uppercase tracking-widest">Simulator V4</div>
            </div>
        </div>
        <div class="relative w-72">
            <input type="text" id="quick-search" placeholder="Smart Search Parameter..." class="w-full bg-slate-900 border border-slate-700 text-slate-200 text-xs rounded px-3 py-1.5 outline-none focus:border-blue-500 placeholder-slate-600">
            <div id="search-results" class="absolute top-full left-0 right-0 mt-1 bg-slate-800 border border-slate-700 rounded shadow-2xl hidden flex-col max-h-64 overflow-y-auto z-50"></div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative z-0">
        <!-- Sidebar -->
        <nav id="sidebar" class="w-48 bg-slate-950 border-r border-slate-800 flex flex-col py-2 shrink-0">
            <!-- Tabs verranno generati dinamicamente, Setup in fondo -->
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col lg:flex-row gap-4 p-4 overflow-hidden bg-slate-900">
            
            <!-- Parameters Area -->
            <section class="flex-1 bg-slate-800 border border-slate-700 rounded flex flex-col overflow-hidden relative">
                <div class="p-3 border-b border-slate-700 bg-slate-800/50 z-10">
                    <h2 id="current-tab-title" class="text-sm font-bold text-blue-400 uppercase tracking-wider">Routine</h2>
                </div>
                <div id="params-container" class="flex-1 overflow-y-auto p-4 relative">
                    <!-- Campi iniettati da main.js -->
                </div>
            </section>

            <!-- Viewer & Dashboard -->
            <section class="w-full lg:w-96 flex flex-col gap-4 shrink-0 overflow-y-auto">
                <!-- SVG Viewport -->
                <div class="bg-black border border-slate-700 rounded aspect-square relative flex items-center justify-center overflow-hidden drop-shadow-xl" id="mri-viewport">
                    <!-- SVG iniettato da phantom.js -->
                </div>

                <!-- Dashboard Risultati -->
                <div class="bg-slate-800 border border-slate-700 rounded p-4 grid grid-cols-2 gap-3">
                    <div class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <div class="text-[10px] text-slate-500 uppercase">Acq. Time (TA)</div>
                        <div id="out-ta" class="font-mono text-lg text-slate-200">0:00</div>
                    </div>
                    <div class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <div class="text-[10px] text-slate-500 uppercase">ETL / Shots</div>
                        <div id="out-etl" class="font-mono text-sm text-slate-200">-</div>
                    </div>
                    <div class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <div class="text-[10px] text-slate-500 uppercase">SAR (W/kg)</div>
                        <div id="out-sar" class="font-mono text-sm text-slate-200">0.00</div>
                    </div>
                    <div class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <div class="text-[10px] text-slate-500 uppercase">Voxel Res (mm)</div>
                        <div id="out-res" class="font-mono text-xs text-blue-300">0.0 x 0.0 x 0.0</div>
                    </div>
                    <div class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <div class="text-[10px] text-slate-500 uppercase">SNR Base</div>
                        <div id="out-snr-base" class="font-mono text-lg text-slate-400">0.00</div>
                    </div>
                    <div id="box-snr-final" class="bg-blue-900/20 border border-blue-500 p-2 rounded transition-colors">
                        <div class="text-[10px] text-blue-300 uppercase">SNR Final</div>
                        <div id="out-snr-final" class="font-mono text-xl font-bold text-blue-400">0.00</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/phantom.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
