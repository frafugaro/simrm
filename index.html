<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Simulator - Architect Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        /* Tab attivi */
        .tab-btn.active { background-color: #1e293b; border-left-color: #3b82f6; color: #ffffff; }
    </style>
</head>
<body class="h-screen bg-slate-900 text-slate-300 font-sans flex flex-col overflow-hidden text-sm select-none">

    <!-- Header & Search Engine -->
    <header class="bg-slate-950 border-b border-slate-800 p-3 flex justify-between items-center shrink-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-blue-600 text-white font-bold flex items-center justify-center rounded shadow-lg shadow-blue-900/50">MRI</div>
            <div>
                <h1 class="text-base font-bold text-slate-100 tracking-wide">SIMULATORE CLINICO 3T</h1>
                <p class="text-xs text-slate-500">Architettura Modulare - Fase 1</p>
            </div>
        </div>
        
        <!-- Smart Search -->
        <div class="relative w-72">
            <input type="text" id="quick-search" placeholder="Cerca parametro (es. TR, FOV)..." 
                   class="w-full bg-slate-900 border border-slate-700 text-slate-200 text-xs rounded-md px-4 py-2 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-slate-600" 
                   oninput="window.searchParameters(this.value)">
            
            <!-- Risultati Ricerca -->
            <div id="search-results" class="absolute top-full left-0 right-0 mt-1 max-h-64 overflow-y-auto bg-slate-800 border border-slate-700 rounded-md shadow-2xl hidden flex-col z-50">
                <!-- Popolato via JS -->
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden relative z-0">
        
        <!-- Sidebar Navigation -->
        <aside class="w-48 bg-slate-950 border-r border-slate-800 flex flex-col shrink-0">
            <div class="flex flex-col flex-1 overflow-y-auto">
                <button onclick="window.switchTab('routine')" class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-tab="routine">Routine</button>
                <button onclick="window.switchTab('contrast')" class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-tab="contrast">Contrast</button>
                <button onclick="window.switchTab('resolution')" class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-tab="resolution">Resolution</button>
                <button onclick="window.switchTab('geometry')" class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-tab="geometry">Geometry</button>
                <button onclick="window.switchTab('physio')" class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-tab="physio">Physio</button>
                <button onclick="window.switchTab('sequence')" class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-tab="sequence">Sequence</button>
            </div>
            
            <!-- Setup Button Separato in basso -->
            <button onclick="window.switchTab('setup')" class="tab-btn mt-auto p-4 text-left font-bold border-l-4 border-transparent text-blue-400 hover:bg-slate-800 transition-colors border-t border-slate-800 tracking-wider uppercase text-xs" data-tab="setup">
                ⚙️ Setup
            </button>
        </aside>

        <!-- Dynamic Parameters Container -->
        <main class="flex-1 overflow-y-auto p-6 bg-slate-900 flex flex-col items-start">
            <div id="params-container" class="w-full max-w-4xl bg-slate-800 border border-slate-700 rounded-lg p-6 shadow-xl">
                <!-- Generato via JS -->
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
